max_steps = 800
seq_len = 2048
max_async_level = 4
clean_output_dir = true

[deployment]
num_infer_gpus = 1
num_train_gpus = 1

[model]
name = "sofinvalery/mera-qwen3-4b-sft"

[wandb]
project = "mera"

[ckpt]
interval = 400
keep_last = 1

[inference]
enable_lora = true
max_lora_rank = 16
gpu_memory_utilization = 0.95

[inference.model]
dtype = "bfloat16"
max_model_len = 2048
trust_remote_code = true

[trainer.model]
attn = "sdpa"
compile = { fullgraph = false }
optimization_dtype = "bfloat16"
reduce_dtype = "bfloat16"
fused_lm_head_token_chunk_size = "auto"
lora = { rank = 16, alpha = 32.0, dropout = 0.0, target_modules = ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"] }

[trainer.tokenizer]
name = "sofinvalery/mera-qwen3-4b-sft"
trust_remote_code = true

[trainer.optim]
lr = 1e-6
weight_decay = 0.0

[orchestrator]
token_batch_size = 131072
max_inflight_rollouts = 256
rollouts_per_example = 8

[orchestrator.sampling]
temperature = 1.0
max_tokens = 256
min_tokens = 0
repetition_penalty = 1.0

[orchestrator.buffer]
online_difficulty_filtering = true

[orchestrator.rollout_transport]
type = "zmq"

[trainer.rollout_transport]
type = "zmq"

[[orchestrator.env]]
id = "chegeka"
args = { split = "train" }

[[orchestrator.env]]
id = "lcs"
args = { split = "public_test" }

[[orchestrator.env]]
id = "mamuramu"
args = { split = "train" }

[[orchestrator.env]]
id = "mathlogicqa"
args = { split = "train" }

[[orchestrator.env]]
id = "multiq"
args = { split = "train" }

[[orchestrator.env]]
id = "parus"
args = { split = "train" }

[[orchestrator.env]]
id = "rcb"
args = { split = "train" }

[[orchestrator.env]]
id = "rumodar"
args = { split = "public_test" }

[[orchestrator.env]]
id = "rumultiar"
args = { split = "train" }

[[orchestrator.env]]
id = "ruopenbookqa"
args = { split = "train" }

[[orchestrator.env]]
id = "rutie"
args = { split = "train" }

[[orchestrator.env]]
id = "ruworldtree"
args = { split = "train" }

[[orchestrator.env]]
id = "rwsd"
args = { split = "train" }

[[orchestrator.env]]
id = "use"
args = { split = "train" }
